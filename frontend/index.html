<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Stage GUI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Stage Instructions</h1>

    <nav aria-label="Modes">
      <button class="tab-btn active" data-tab="single" id="tab-single" role="tab" aria-selected="true">Single Instruction Mode</button>
      <button class="tab-btn" data-tab="arrows" id="tab-arrows" role="tab" aria-selected="false">Continuous Instructions</button>
      <button class="tab-btn" data-tab="auto1" id="tab-auto1" role="tab" aria-selected="false">Automatic</button>
    </nav>


   <section id="panel-auto1" class="panel" role="tabpanel" aria-labelledby="tab-auto1">
      <h3>Auto Mode</h3>
      <div class="row">
        <button id="start" class="btn-success">Start</button>
        <button id="stop" class="btn-danger" disabled>Stop</button>
      </div>
      <div class="coords">
        <div>X</div>
        <div id="coordX" class="badge">0.00</div>
        <div>Y</div>
        <div id="coordY" class="badge">0.00</div>
      </div>
      <div class="video-container">
        <img src="http://192.168.1.100:5000/video_feed" alt="Camera Feed/Server IP" width="640" height="480">
      </div>
    </section>

    <section id="panel-single" class="panel active" role="tabpanel" aria-labelledby="tab-single">
      <h3>Single Command</h3>
      <div class="row">
        <span for="direction">Direction:</span>
        <div class="dir-group">
          <button class="dir-btn active" data-dir="UP">UP</button>
          <button class="dir-btn" data-dir="DOWN">DOWN</button>
          <button class="dir-btn" data-dir="LEFT">LEFT</button>
          <button class="dir-btn" data-dir="RIGHT">RIGHT</button>
        </div>
      </div>

      <div class="row">
        <label for="singleDistance">Distance:</label>
        <input id="singleDistance" type="number" step="1" min="0" placeholder="10" />
        <button id="queueBtn">Apply Step</button>
      </div>

      <div class="row">
        <div>Last Command</div>
        <div id="lastDir" class="badge">—</div>
        <div id="lastDist" class="badge">—</div>
      </div>
    </section>

    <section id="panel-arrows" class="panel" role="tabpanel" aria-labelledby="tab-arrows">
      <h3>Continuous</h3>
      <div class="row">
        <label for="step">Step Size:</label>
        <input id="step" type="number" step="1" min="0" placeholder="5" />
        <button id="applyStep">Apply Step</button>
      </div>

      <div class="row">
        <div>Direction</div>
        <div id="contDir" class="badge">—</div>
        <div>Step</div>
        <div id="contBadge" class="badge">—</div>
      </div>
    </section>

    <h2>Event Log</h2>
    <pre id="log"></pre>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
